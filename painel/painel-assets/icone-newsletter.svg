<?xml version="1.0" encoding="UTF-8"?>
<!-- Icone Newsletter. Pagina editorial dobrada com linhas de texto. 64x64 base. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="news-fold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e8d6"/>
      <stop offset="100%" stop-color="#e6dcc4"/>
    </linearGradient>
  </defs>
  <!-- Pagina principal -->
  <rect x="10" y="8" width="44" height="50" fill="url(#news-fold)" stroke="#1a1410" stroke-width="1.2"/>
  <!-- Dobra superior (canto direito) -->
  <path d="M 44,8 L 54,8 L 54,18 Z" fill="#d4af37" stroke="#1a1410" stroke-width="1"/>
  <!-- Linhas de texto editorial -->
  <line x1="16" y1="18" x2="40" y2="18" stroke="#3d5a3d" stroke-width="1.5"/>
  <line x1="16" y1="26" x2="48" y2="26" stroke="#1a1410" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="32" x2="48" y2="32" stroke="#1a1410" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="38" x2="42" y2="38" stroke="#1a1410" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="44" x2="48" y2="44" stroke="#1a1410" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="50" x2="36" y2="50" stroke="#1a1410" stroke-width="0.8" opacity="0.5"/>
  <!-- Sinete pequeno no rodape -->
  <text x="48" y="56" font-family="Georgia, serif" font-size="10" fill="#3d5a3d">✦</text>
</svg>
