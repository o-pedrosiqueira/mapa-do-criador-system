<?xml version="1.0" encoding="UTF-8"?>
<!--
  Banner hero editorial. 1600x400 (aspect 4:1).
  Para uso em hero strip do painel, header de pagina, e como background decorativo.
  Composicao zine: texturas de paper sobreposto + sinete sutil + horizon line.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Geist+Mono:wght@500&amp;display=swap");
      .h-display { font-family: "Instrument Serif", Georgia, serif; font-weight: 400; }
      .h-mono { font-family: "Geist Mono", ui-monospace, monospace; }
    </style>
    <pattern id="hero-grain" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#1a1410" opacity="0.04"/>
      <circle cx="4" cy="4" r="0.3" fill="#1a1410" opacity="0.03"/>
    </pattern>
    <linearGradient id="hero-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0e8d6" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#f0e8d6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e6dcc4" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Fundo paper -->
  <rect width="1600" height="400" fill="#f0e8d6"/>
  <rect width="1600" height="400" fill="url(#hero-grain)"/>
  <!-- Faixas horizontais sutis (textura zine) -->
  <g opacity="0.06">
    <line x1="0" y1="60" x2="1600" y2="60" stroke="#1a1410" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="1600" y2="100" stroke="#1a1410" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1600" y2="300" stroke="#1a1410" stroke-width="0.5"/>
    <line x1="0" y1="340" x2="1600" y2="340" stroke="#1a1410" stroke-width="0.5"/>
  </g>
  <!-- Sinete grande translucido a direita como ornamento -->
  <g transform="translate(1380,200)" fill="#3d5a3d" opacity="0.18">
    <path d="M 0,-140 Q 10,-22 0,0 Q -10,-22 0,-140 Z M 0,140 Q 10,22 0,0 Q -10,22 0,140 Z"/>
    <path d="M 140,0 Q 22,-10 0,0 Q 22,10 140,0 Z M -140,0 Q -22,-10 0,0 Q -22,10 -140,0 Z"/>
    <g opacity="0.7">
      <path d="M 85,-85 Q 18,-18 0,0 Q 18,-18 85,-85 Z M -85,85 Q -18,18 0,0 Q -18,18 -85,85 Z"/>
      <path d="M -85,-85 Q -18,-18 0,0 Q -18,-18 -85,-85 Z M 85,85 Q 18,18 0,0 Q 18,18 85,85 Z"/>
    </g>
  </g>
  <!-- Textura overlay de gradiente paper -->
  <rect width="1600" height="400" fill="url(#hero-fade)"/>
  <!-- Linha vermelha de regua editorial no topo -->
  <line x1="80" y1="68" x2="220" y2="68" stroke="#3d5a3d" stroke-width="1.5"/>
  <!-- Eyebrow + manchete + lede em coluna a esquerda -->
  <text x="80" y="95" class="h-mono" font-size="12" letter-spacing="3" fill="#3d5a3d">
    ✦  PAINEL EDITORIAL
  </text>
  <text x="80" y="210" class="h-display" font-size="76" fill="#1a1410" letter-spacing="-2.5">
    Mapa do <tspan font-style="italic" fill="#3d5a3d">Criador</tspan>
  </text>
  <text x="80" y="280" class="h-display" font-style="italic" font-size="22" fill="#4a3f30">
    Capture · Cure · Crie. Tres horas por semana, sete dias de conteudo na sua voz.
  </text>
  <text x="80" y="350" class="h-mono" font-size="11" letter-spacing="2.5" fill="#7a705f">
    PEDRO SIQUEIRA · 2026
  </text>
</svg>
