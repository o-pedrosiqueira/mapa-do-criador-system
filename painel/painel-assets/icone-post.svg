<?xml version="1.0" encoding="UTF-8"?>
<!-- Icone Post avulso. Ensaio breve, marcador editorial. 64x64. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background paper -->
  <rect x="8" y="12" width="48" height="40" fill="#f0e8d6" stroke="#1a1410" stroke-width="1.2"/>
  <!-- Marca lateral em moss (border-left editorial) -->
  <rect x="8" y="12" width="3" height="40" fill="#3d5a3d"/>
  <!-- Sinete pequeno no canto superior direito -->
  <text x="50" y="22" font-family="Georgia, serif" font-size="11" fill="#3d5a3d">✦</text>
  <!-- Tese central destacada (linha mais grossa) -->
  <line x1="15" y1="22" x2="45" y2="22" stroke="#1a1410" stroke-width="1.8"/>
  <line x1="15" y1="27" x2="42" y2="27" stroke="#1a1410" stroke-width="1.8"/>
  <!-- Corpo (3 linhas mais finas) -->
  <line x1="15" y1="36" x2="48" y2="36" stroke="#1a1410" stroke-width="0.7" opacity="0.5"/>
  <line x1="15" y1="40" x2="48" y2="40" stroke="#1a1410" stroke-width="0.7" opacity="0.5"/>
  <line x1="15" y1="44" x2="38" y2="44" stroke="#1a1410" stroke-width="0.7" opacity="0.5"/>
  <!-- Aspas ornamentais (terminacao editorial) -->
  <text x="46" y="50" font-family="Georgia, serif" font-size="14" fill="#d4af37" font-style="italic">"</text>
</svg>
