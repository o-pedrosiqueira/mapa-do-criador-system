<?xml version="1.0" encoding="UTF-8"?>
<!--
  Icone otimizado para macOS app icon. viewBox 1024x1024 (tamanho nativo do icon mais alto).
  Squircle ocupando 100% da area (rx = 22.4% do tamanho = 230px), seguindo Apple HIG.
  Conteudo (sinete + wordmark) centralizado em ~70% da area, com respiracao nas bordas.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="mac-paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e8d6"/>
      <stop offset="100%" stop-color="#e8dfc8"/>
    </linearGradient>
    <pattern id="mac-grain" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2" fill="#1a1410" opacity="0.05"/>
      <circle cx="22" cy="22" r="1.4" fill="#1a1410" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Squircle full-bleed -->
  <rect width="1024" height="1024" rx="230" fill="url(#mac-paper)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#mac-grain)"/>

  <!-- Moldura dupla interna (margem ~80px do squircle) -->
  <rect x="80" y="80" width="864" height="864" rx="170" fill="none" stroke="#1a1410" stroke-width="6"/>
  <rect x="120" y="120" width="784" height="784" rx="135" fill="none" stroke="#1a1410" stroke-width="3" opacity="0.5"/>

  <!-- Sinete moss centralizado (translade ao centro 512,460 para deixar espaco do wordmark) -->
  <g transform="translate(512,440)" fill="#3d5a3d">
    <!-- Eixo Norte-Sul vertical (mais alongado) -->
    <path d="M 0,-270 Q 28,-60 0,0 Q -28,-60 0,-270 Z M 0,270 Q 28,60 0,0 Q -28,60 0,270 Z"/>
    <!-- Eixo Leste-Oeste horizontal -->
    <path d="M 270,0 Q 60,-28 0,0 Q 60,28 270,0 Z M -270,0 Q -60,-28 0,0 Q -60,28 -270,0 Z"/>
    <!-- Diagonais secundarias -->
    <g opacity="0.7">
      <path d="M 165,-165 Q 50,-50 0,0 Q 50,-50 165,-165 Z M -165,165 Q -50,50 0,0 Q -50,50 -165,165 Z"/>
      <path d="M -165,-165 Q -50,-50 0,0 Q -50,-50 -165,-165 Z M 165,165 Q 50,50 0,0 Q 50,50 165,165 Z"/>
    </g>
    <!-- Centro dourado -->
    <circle r="22" fill="#d4af37"/>
  </g>

  <!-- Wordmark em Instrument Serif -->
  <text x="512" y="850" font-family="'Instrument Serif', Georgia, serif" font-size="78" font-style="italic" fill="#1a1410" text-anchor="middle" letter-spacing="-2">
    Mapa do Criador
  </text>
</svg>
