<?xml version="1.0" encoding="UTF-8"?>
<!-- Icone Stories. Tela vertical com barra de progresso, indicador de play e quote. 64x64. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Frame vertical (proporcao 9:16) -->
  <rect x="20" y="6" width="24" height="52" rx="3" fill="#1a1410" stroke="#1a1410" stroke-width="1"/>
  <!-- Barra de progresso no topo -->
  <rect x="23" y="10" width="5" height="1.5" rx="0.7" fill="#f0e8d6"/>
  <rect x="30" y="10" width="5" height="1.5" rx="0.7" fill="#f0e8d6" opacity="0.4"/>
  <rect x="37" y="10" width="5" height="1.5" rx="0.7" fill="#f0e8d6" opacity="0.4"/>
  <!-- Sinete moss no centro como aspas decorativas -->
  <text x="32" y="32" font-family="Georgia, serif" font-size="14" fill="#3d5a3d" text-anchor="middle" font-style="italic">✦</text>
  <!-- Linhas de quote -->
  <line x1="24" y1="38" x2="40" y2="38" stroke="#f0e8d6" stroke-width="1"/>
  <line x1="24" y1="42" x2="36" y2="42" stroke="#f0e8d6" stroke-width="1"/>
  <!-- Sticker caixinha de pergunta no rodape -->
  <rect x="24" y="48" width="16" height="6" rx="1" fill="none" stroke="#d4af37" stroke-width="1"/>
  <text x="32" y="52.8" font-family="Georgia, serif" font-size="4.5" fill="#d4af37" text-anchor="middle" font-style="italic">pergunta</text>
</svg>
