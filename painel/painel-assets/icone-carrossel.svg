<?xml version="1.0" encoding="UTF-8"?>
<!-- Icone Carrossel. Tres slides empilhados em perspectiva, com indicadores. 64x64. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Slide de tras (sombra) -->
  <rect x="14" y="14" width="40" height="38" fill="#e6dcc4" stroke="#1a1410" stroke-width="1" opacity="0.5"/>
  <!-- Slide do meio -->
  <rect x="11" y="11" width="40" height="38" fill="#f0e8d6" stroke="#1a1410" stroke-width="1" opacity="0.8"/>
  <!-- Slide da frente -->
  <rect x="8" y="8" width="40" height="38" fill="#f0e8d6" stroke="#1a1410" stroke-width="1.2"/>
  <!-- Capa do slide da frente: tese central + sinete -->
  <text x="13" y="22" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#3d5a3d">✦</text>
  <line x1="13" y1="28" x2="42" y2="28" stroke="#1a1410" stroke-width="1.2"/>
  <line x1="13" y1="32" x2="38" y2="32" stroke="#1a1410" stroke-width="1.2"/>
  <line x1="13" y1="40" x2="32" y2="40" stroke="#1a1410" stroke-width="0.6" opacity="0.5"/>
  <!-- Indicadores de paginas (dots) -->
  <circle cx="18" cy="56" r="2" fill="#3d5a3d"/>
  <circle cx="28" cy="56" r="2" fill="#1a1410" opacity="0.3"/>
  <circle cx="38" cy="56" r="2" fill="#1a1410" opacity="0.3"/>
  <circle cx="48" cy="56" r="2" fill="#1a1410" opacity="0.3"/>
</svg>
